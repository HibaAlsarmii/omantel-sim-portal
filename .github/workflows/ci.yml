name: Omantel SIM Portal CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Phone Validation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run phone validation tests
        run: node test.js

      - name: Pipeline complete
        run: echo "All tests passed — SIM portal phone validation verified"